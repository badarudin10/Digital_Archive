<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biipsite Digital Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <div class="max-w-5xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-blue-700 mb-8">Sistem Arsip Digital</h1>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-10 border border-gray-100">
            <h2 class="font-bold mb-4">Tambah Arsip Baru</h2>
            <form id="uploadForm" class="flex flex-col md:flex-row gap-4">
                <input type="text" id="namaFile" placeholder="Nama Dokumen" class="flex-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                <input type="file" id="fileInput" class="flex-1 p-2 border rounded-xl" required>
                <button type="submit" id="btnSimpan" class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition">
                    <i class="fas fa-save mr-2"></i>Simpan
                </button>
            </form>
        </div>

        <div class="mb-6">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari arsip..." class="w-full p-4 rounded-2xl border-none shadow-sm ring-1 ring-gray-200 outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
            <table class="w-full text-left" id="archiveTable">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Tanggal</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Nama Dokumen</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-50">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="previewModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-4xl h-[85vh] rounded-3xl flex flex-col overflow-hidden shadow-2xl">
            <div class="p-4 border-b flex justify-between items-center">
                <span class="font-bold">Pratinjau Dokumen</span>
                <button onclick="closePreview()" class="text-2xl hover:text-red-500">&times;</button>
            </div>
            <iframe id="previewFrame" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script>
        // GANTI INI DENGAN URL WEB APP KAMU
        const API_URL = "https://script.google.com/macros/s/AKfycbwJ_7iOzkVSdtL4Bq7NtuwdOMMf_x2Iv-1DQTVr2GpRrHdVMjOjcbO6hcDOVJKaqrvjqA/exec";

        // Ambil Data saat halaman dibuka
        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const body = document.getElementById('tableBody');
                body.innerHTML = ''; 

                data.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50/50 transition";
                    tr.innerHTML = `
                        <td class="p-4 text-sm text-gray-500">${new Date(row[0]).toLocaleDateString()}</td>
                        <td class="p-4 font-medium">${row[1]}</td>
                        <td class="p-4 text-right">
                            <button onclick="openPreview('${row[3]}')" class="text-blue-600 hover:underline">Lihat</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            } catch (e) { console.error("Data kosong atau error"); }
        }

        // Upload File
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSimpan');
            const file = document.getElementById('fileInput').files[0];
            const nama = document.getElementById('namaFile').value;

            btn.disabled = true;
            btn.innerHTML = "Mengupload...";

            const reader = new FileReader();
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const params = new URLSearchParams({
                    fileData: base64,
                    fileName: file.name,
                    mimeType: file.type,
                    nama: nama,
                    kategori: "Digital Archive"
                });

                await fetch(API_URL, { method: 'POST', body: params, mode: 'no-cors' });
                alert("Berhasil!");
                location.reload();
            };
            reader.readAsDataURL(file);
        });

        function openPreview(url) {
            const embedUrl = url.replace('/view', '/preview');
            document.getElementById('previewFrame').src = embedUrl;
            document.getElementById('previewModal').classList.remove('hidden');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.add('hidden');
            document.getElementById('previewFrame').src = '';
        }

        function filterTable() {
            const q = document.getElementById('searchInput').value.toUpperCase();
            const rows = document.getElementById('tableBody').getElementsByTagName('tr');
            for (let r of rows) {
                r.style.display = r.innerText.toUpperCase().includes(q) ? "" : "none";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
